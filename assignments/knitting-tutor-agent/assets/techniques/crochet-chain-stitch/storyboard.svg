<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf6ef"/><stop offset="1" stop-color="#eee6da"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#584638" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0 0L12 6 0 12Z" fill="#d55650"/>
    </marker>
    <style>
      .panel{fill:#fffdfa;stroke:#d9cbbb;stroke-width:3}
      .step{font:700 26px 'Apple SD Gothic Neo','Noto Sans KR',sans-serif;fill:#d55650;letter-spacing:2px}
      .title{font:700 40px 'Apple SD Gothic Neo','Noto Sans KR',sans-serif;fill:#2e3432}
      .desc{font:400 24px 'Apple SD Gothic Neo','Noto Sans KR',sans-serif;fill:#5f6663}
      .label{font:600 22px 'Apple SD Gothic Neo','Noto Sans KR',sans-serif;fill:#315f5c}
      .note{font:500 21px 'Apple SD Gothic Neo','Noto Sans KR',sans-serif;fill:#6b6f6c}
      .count{font:700 22px 'Apple SD Gothic Neo','Noto Sans KR',sans-serif;fill:#d55650}
      .hook{fill:none;stroke:#5b9590;stroke-width:26;stroke-linecap:round;stroke-linejoin:round}
      .hook-edge{fill:none;stroke:#2f6f6a;stroke-width:6;stroke-linecap:round}
      .yarn{fill:none;stroke:#e16b62;stroke-width:20;stroke-linecap:round;stroke-linejoin:round}
      .yarn-old{fill:none;stroke:#edaaa4;stroke-width:18;stroke-linecap:round;stroke-dasharray:12 10}
      .motion{fill:none;stroke:#d55650;stroke-width:7;stroke-linecap:round;stroke-dasharray:13 11;marker-end:url(#arrow)}
      .guide{fill:none;stroke:#8a918d;stroke-width:3;stroke-dasharray:7 7}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <text x="72" y="67" class="title" font-size="48">사슬뜨기 구조 · CHAIN STITCH</text>
  <text x="1510" y="65" class="title" fill="#d55650">○ = ch = 사슬 1코</text>
  <text x="74" y="101" class="desc">손 자세는 실제 영상을 보고, 이 도식에서는 실과 고리가 어떻게 바뀌는지만 확인하세요.</text>

  <!-- STEP 1 -->
  <g transform="translate(58 135)" filter="url(#shadow)">
    <rect class="panel" width="874" height="406" rx="32"/>
    <text x="38" y="48" class="step">STEP 01 · 시작 상태</text>
    <text x="38" y="94" class="title">바늘 위에는 활성 고리 1개</text>
    <text x="38" y="130" class="desc">이 고리는 아직 사슬 코 수에 포함하지 않아요.</text>

    <!-- right-handed hook points left -->
    <path class="hook" d="M770 247H445Q402 247 402 213Q402 187 431 187Q450 187 458 202"/>
    <path class="hook-edge" d="M409 210Q418 198 441 204"/>
    <ellipse cx="507" cy="247" rx="54" ry="72" class="yarn"/>
    <path class="yarn" d="M464 205C405 172 345 166 267 183"/>
    <path class="yarn" d="M471 299C413 333 349 344 271 333"/>
    <path class="guide" d="M503 166V116"/>
    <text x="425" y="109" class="label">활성 고리 · 세지 않음</text>
    <path class="guide" d="M279 184L199 159"/>
    <text x="39" y="159" class="label">작업실</text>
    <path class="guide" d="M280 333L204 361"/>
    <text x="39" y="370" class="label">꼬리실</text>
  </g>

  <!-- STEP 2 -->
  <g transform="translate(988 135)" filter="url(#shadow)">
    <rect class="panel" width="874" height="406" rx="32"/>
    <text x="38" y="48" class="step">STEP 02 · 실 감기</text>
    <text x="38" y="94" class="title">작업실을 뒤에서 앞으로 걸어요</text>
    <text x="38" y="130" class="desc">홈에 실을 건 뒤 바늘 끝을 살짝 아래로 돌립니다.</text>

    <path class="hook" d="M777 247H447Q403 247 403 214Q403 188 431 188Q450 188 460 203"/>
    <path class="hook-edge" d="M410 210Q422 197 443 205"/>
    <ellipse cx="510" cy="247" rx="55" ry="72" class="yarn-old"/>
    <path class="yarn" d="M269 175C342 160 395 183 438 212Q463 230 489 213"/>
    <path class="motion" d="M306 320C285 248 319 185 395 166"/>
    <text x="39" y="184" class="label">작업실</text>
    <path class="guide" d="M269 176L151 184"/>
    <text x="572" y="336" class="label">바늘 홈 ↓</text>
    <path class="motion" d="M668 294Q622 246 668 202"/>
  </g>

  <!-- STEP 3 -->
  <g transform="translate(58 586)" filter="url(#shadow)">
    <rect class="panel" width="874" height="406" rx="32"/>
    <text x="38" y="48" class="step">STEP 03 · 고리 통과</text>
    <text x="38" y="94" class="title">잡은 실만 기존 고리 안으로</text>
    <text x="38" y="130" class="desc">기존 고리는 바늘 머리를 지나 빠지고, 새 고리 하나가 남아요.</text>

    <path class="hook" d="M782 241H446Q402 241 402 209Q402 184 431 184Q451 184 460 199"/>
    <path class="hook-edge" d="M410 206Q421 193 443 201"/>
    <ellipse cx="545" cy="241" rx="77" ry="98" class="yarn-old"/>
    <path class="yarn" d="M266 176C348 159 393 180 437 210Q463 227 493 211"/>
    <path class="yarn" d="M470 270Q498 302 539 320"/>
    <path class="motion" d="M461 342C564 350 649 308 705 252"/>
    <text x="39" y="183" class="label">새 고리가 될 실</text>
    <text x="479" y="372" class="label">기존 고리는 빠져나감</text>
  </g>

  <!-- STEP 4 -->
  <g transform="translate(988 586)" filter="url(#shadow)">
    <rect class="panel" width="874" height="406" rx="32"/>
    <text x="38" y="48" class="step">STEP 04 · 한 코 완성</text>
    <text x="38" y="94" class="title">바늘 아래 V 하나가 사슬 1코</text>
    <text x="38" y="130" class="desc">바늘 위 활성 고리는 빼고, 완성된 V만 셉니다.</text>

    <path class="hook" d="M790 196H632Q588 196 588 164Q588 139 617 139Q637 139 646 154"/>
    <ellipse cx="685" cy="196" rx="51" ry="66" class="yarn"/>
    <path class="yarn" d="M639 158C584 128 539 126 492 146"/>

    <!-- five visible front V stitches, connected but individually countable -->
    <path class="yarn" d="M639 250L586 310L533 250L480 310L427 250L374 310L321 250L268 310L215 250L162 310"/>
    <text x="572" y="332" class="count">1</text>
    <text x="466" y="332" class="count">2</text>
    <text x="360" y="332" class="count">3</text>
    <text x="254" y="332" class="count">4</text>
    <text x="148" y="332" class="count">5</text>
    <path class="guide" d="M684 126V107"/>
    <text x="586" y="104" class="label">활성 고리 · 제외</text>

    <!-- anatomy inset -->
    <rect x="686" y="271" width="153" height="105" rx="18" fill="#f5eee5" stroke="#d9cbbb" stroke-width="2"/>
    <path d="M711 306L735 286L759 306L783 286L807 306" class="yarn" stroke-width="12"/>
    <path d="M722 343H746M770 343H794" class="yarn" stroke-width="12"/>
    <text x="702" y="368" class="note" font-size="17">앞 V / 뒤 범프</text>
  </g>
</svg>
